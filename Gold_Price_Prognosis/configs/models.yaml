seed: 42

# quick_mode keeps HPO trial counts and neural epoch budgets small for fast
# iteration/CI; full_mode is the production-quality budget (now the default).
# Both are configurable here and selected via experiments.yaml: mode.
# update_epochs is the warm-start continuation budget PatchTST/TFT use at
# every rolling window after the first (see models/base.py); it also scales
# with mode so quick_mode's rolling evaluation stays fast end to end.
hpo:
  quick_mode: {n_trials: 3, epochs: 3, patience: 2, timeout: null, update_epochs: 1}
  full_mode: {n_trials: 25, epochs: 60, patience: 8, timeout: null, update_epochs: 5}

# Every model below has `enabled: true`, checked by the notebook/scripts
# before calling it -- flip to `false` to skip a model entirely without
# breaking downstream comparisons, plots, or metrics (see experiments.py).

naive:
  enabled: true

moving_average:
  enabled: true
  window: 20

# Experiment 1 (univariate) -----------------------------------------------

sarima:
  enabled: true
  seasonal_period: 0 # 0 disables the seasonal component
  retrain_each_step: true # full refit from scratch at every rolling window
  search_space:
    p: [0, 4]
    d: [0, 2]
    q: [0, 4]
  fallback:
    order: [2, 1, 2]

patchtst:
  enabled: true
  context_length: 64
  retrain_each_step: true # warm-start continuation at every rolling window after the first (update_epochs budget set per-mode in hpo: above)
  search_space:
    patch_length: [4, 16]
    stride: [2, 8]
    d_model: [16, 64]
    nhead: [2, 8]
    layers: [1, 4]
    learning_rate: [0.0001, 0.01]
    batch_size: [32, 128]
  fallback:
    patch_length: 8
    stride: 4
    d_model: 32
    nhead: 4
    layers: 2
    learning_rate: 0.001
    batch_size: 64

chronos:
  enabled_original: true # the two variants are toggled independently -- each has its own notebook cell/run_* function
  enabled_bolt: true
  context_length: 512 # tail-truncation of available history handed to the pretrained pipeline each window
  variants:
    original: "amazon/chronos-t5-small"
    bolt: "amazon/chronos-bolt-small"

# Experiment 2 (multivariate) ----------------------------------------------

sarimax:
  enabled: true
  seasonal_period: 0
  retrain_each_step: true
  search_space:
    p: [0, 3]
    d: [0, 2]
    q: [0, 3]
  fallback:
    order: [2, 1, 2]

xgboost:
  enabled: true
  retrain_each_step: true
  search_space:
    max_depth: [3, 10]
    learning_rate: [0.01, 0.3]
    n_estimators: [100, 600]
    subsample: [0.5, 1.0]
    colsample_bytree: [0.5, 1.0]
  fallback:
    max_depth: 5
    learning_rate: 0.05
    n_estimators: 300
    subsample: 0.8
    colsample_bytree: 0.8

# Same features/search space as `xgboost` above, but predicts the next-step
# return instead of the raw price level (see models/xgboost_diff.py) --
# trees can't extrapolate a price-level trend the way SARIMAX/neural nets can,
# so this variant is kept and compared side by side rather than replacing it.
xgboost_diff:
  enabled: true
  retrain_each_step: true
  search_space:
    max_depth: [3, 10]
    learning_rate: [0.01, 0.3]
    n_estimators: [100, 600]
    subsample: [0.5, 1.0]
    colsample_bytree: [0.5, 1.0]
  fallback:
    max_depth: 5
    learning_rate: 0.05
    n_estimators: 300
    subsample: 0.8
    colsample_bytree: 0.8

tft:
  enabled: true
  context_length: 64
  retrain_each_step: true # update_epochs budget set per-mode in hpo: above
  search_space:
    hidden_size: [16, 64]
    attention_heads: [1, 4]
    lstm_layers: [1, 2]
    dropout: [0.0, 0.3]
    learning_rate: [0.0001, 0.01]
    batch_size: [32, 128]
  fallback:
    hidden_size: 32
    attention_heads: 2
    lstm_layers: 1
    dropout: 0.1
    learning_rate: 0.001
    batch_size: 64
